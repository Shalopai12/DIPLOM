{% extends "base.html" %}
{% block title %}Меню — Coffee Network{% endblock %}

{% block content %}
  <h1>Меню</h1>

  <form class="filters" method="get" action="{{ url_for('menu') }}">
    <input class="input" type="text" name="q" value="{{ q }}" placeholder="Поиск...">

    <select class="input" name="cat">
      <option value="">Все категории</option>
      {% for c in categories %}
        <option value="{{ c.id }}" {% if cat == c.id %}selected{% endif %}>{{ c.name }}</option>
      {% endfor %}
    </select>

    <select class="input" name="avail">
      <option value="1" {% if only_avail == "1" %}selected{% endif %}>Только доступные</option>
      <option value="0" {% if only_avail == "0" %}selected{% endif %}>Все</option>
    </select>

    <button class="btn btn--ghost" type="submit">Применить</button>
  </form>

  <div class="grid">
    {% for p in products %}
      <div class="card">
        <div class="card__img">
          <img src="{{ p.image_url or '/static/img/placeholder.png' }}" alt="">
        </div>
        <div class="card__body">
          <div class="muted">{{ p.category_name }}</div>
          <div class="card__title">{{ p.name }}</div>
          <div class="card__price">{{ "%.2f"|format(p.price_rub) }} ₽</div>
          <div class="muted small">{{ p.description }}</div>

          <form method="post" action="{{ url_for('cart_add') }}" class="row">
            <input type="hidden" name="product_id" value="{{ p.id }}">
            <input class="qty" type="number" name="qty" value="1" min="1" max="50">
            <button class="btn btn--primary" type="submit" {% if p.is_available != 1 %}disabled{% endif %}>
              {% if p.is_available == 1 %}В корзину{% else %}Нет в наличии{% endif %}
            </button>
          </form>
        </div>
      </div>
    {% endfor %}
  </div>
{% endblock %}
